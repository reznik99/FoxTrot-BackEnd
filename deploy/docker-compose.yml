services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_DATABASE}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - backend

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file: ../.env
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
    networks:
      - backend

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      # Mount only this domain's cert files — not all of /etc/letsencrypt
      - /etc/letsencrypt/live/${TLS_DOMAIN}/fullchain.pem:/etc/nginx/tls/fullchain.pem:ro
      - /etc/letsencrypt/live/${TLS_DOMAIN}/privkey.pem:/etc/nginx/tls/privkey.pem:ro
    networks:
      - backend

volumes:
  pgdata:

networks:
  backend:
